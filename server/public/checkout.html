<!doctype html>
<html lang="es-AR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Checkout</title>
    <style>
      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, "Segoe UI", sans-serif;
        background: #f8fafc;
        color: #111827;
      }
      main {
        max-width: 480px;
        margin: 0 auto;
        padding: 32px 16px;
      }
      .summary {
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        background: #fff;
        padding: 16px;
        margin-bottom: 16px;
      }
      .summary ul {
        list-style: none;
        padding: 0;
        margin: 0 0 12px;
      }
      .summary li {
        display: flex;
        justify-content: space-between;
        padding: 6px 0;
        font-size: 14px;
      }
      .total {
        display: flex;
        justify-content: space-between;
        font-weight: 700;
        border-top: 1px solid #e5e7eb;
        padding-top: 8px;
      }
      label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        margin: 12px 0 6px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 12px;
        border-radius: 6px;
        border: 1px solid #d1d5db;
        font: inherit;
      }
      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      button {
        width: 100%;
        margin-top: 20px;
        padding: 14px;
        border: 0;
        border-radius: 6px;
        background: #0f766e;
        color: #fff;
        font-weight: 700;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.6;
        cursor: wait;
      }
      .error {
        color: #b91c1c;
        font-size: 14px;
        margin-top: 12px;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="summary" id="summary">Cargando...</section>
      <form id="address-form" hidden>
        <label>Correo electrónico<input name="email" type="email" required /></label>
        <div class="row">
          <label>Nombre<input name="firstName" required /></label>
          <label>Apellido<input name="lastName" required /></label>
        </div>
        <label>Dirección<input name="address1" required /></label>
        <label>Casa, depto, etc. (opcional)<input name="address2" /></label>
        <div class="row">
          <label>Ciudad<input name="city" required /></label>
          <label>Provincia<input name="province" required /></label>
        </div>
        <div class="row">
          <label>Código postal<input name="zip" required /></label>
          <label>Teléfono<input name="phone" type="tel" required /></label>
        </div>
        <button type="submit" id="submit-button">Continuar al pago</button>
      </form>
      <p class="error" id="error" hidden></p>
    </main>
    <script src="/checkout.js"></script>
  </body>
</html>
